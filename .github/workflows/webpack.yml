name: Deploy to GitHub Pages (docs)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: client
        env:
          # Work around npm optional-deps bug impacting native bindings (rollup/esbuild)
          npm_config_optional: "true"
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional --no-audit --no-fund
          npm rebuild

      - name: Debug native bindings (optional)
        working-directory: client
        run: |
          node -p "process.platform + ' ' + process.arch"
          npm ls @rolldown/binding-linux-x64-gnu || true

      - name: Build (GitHub Pages)
        env:
          # Ensure correct base path: /<repo-name>/
          VITE_PAGES_BASE: "/${{ github.event.repository.name }}/"
          # Must be absolute; relative /api would call GitHub Pages (static) → 405 on POST.
          VITE_API_BASE_URL: "https://ielts-simulator-api.onrender.com"
        working-directory: client
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

